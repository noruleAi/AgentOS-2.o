server {
    listen 80;
    server_name localhost;

    # Root source of static pages
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Direct fallback rewrite rule for React Router compatibility
        try_files $uri $uri/ /index.html;
    }

    # Enable responsive response asset compressions (Optimization)
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Cache Control settings for static content
    location ~* \.(?:css|js)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Media / Image optimizations caching
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        root /usr/share/nginx/html;
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Custom Error Pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
